# Workflow for master branch.
#
# The workflow executes the following jobs:
#   1) Compile the code and run tests.
#   2) Create a new Docker container and push it to Docker Hub.
#   3) Create a new Maven release.
#   4) Publish the generated artifact on GitHub Packages.
#   5) Delete the oldest build artifact from GitHub Packages.
#   

name: Master branch workflow

on:
  push:
    # branches:
    #   - master

jobs:
  build:
    name: Maven package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up JDK 14
        uses: actions/setup-java@v1
        with:
          java-version: 1.14
      - name: Create settings.xml
        uses: whelk-io/maven-settings-xml-action@v4
        with:
          repositories: '[{
            "id": "github",
            "name": "GitHub mika-alaoutinen Apache Maven Packages",
            "url": "https://maven.pkg.github.com/mika-alaoutinen/kiskotaan-openapi"
          }]'
          servers: '[{
            "id": "github",
            "username": "mika-alaoutinen",
            "password": "${{ secrets.ACCESS_TOKEN }}"
          }]'
      - name: Build and test with Maven
        run: mvn -B clean package

  docker:
    name: Creates Docker image and pushes it to Docker Hub
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build and push Docker images
        uses: docker/build-push-action@v1.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: mikaalaoutinen/kiskotaan-backend
          tags: latest

